<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Sessions — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">StudyMatch</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="sessions.html">Browse Sessions</a></li>
                <li class="nav-item"><a class="nav-link" href="post-session.html">Post Session</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">My Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
            </ul>
            <div id="nav-guest" class="d-none">
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="register.html" class="btn btn-light">Register</a>
            </div>
            <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                <span class="text-white">Hi, <strong id="nav-username"></strong></span>
                <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Browse Sessions</h2>
        <a href="post-session.html" class="btn btn-primary">+ Post Session</a>
    </div>

    <div class="mb-4">
        <input type="text" id="search-input" class="form-control" placeholder="Filter by course name...">
    </div>

    <div id="sessions-container" class="row g-3"></div>

    <p id="no-sessions" class="d-none text-center text-muted mt-5">No study sessions posted yet. Be the first!</p>
    <p id="no-results" class="d-none text-center text-muted mt-3">No sessions match your search.</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script>
    let allSessions = [];
    let currentUserId = null;

    async function init() {
        if (isLoggedIn()) {
            const res = await fetch(BASE_URL + '/users/me', { headers: authHeaders() });
            if (res.ok) {
                const me = await res.json();
                currentUserId = me.id;
            }
        }

        await loadSessions();

        document.getElementById('search-input').addEventListener('input', function () {
            renderSessions(this.value.trim().toLowerCase());
        });
    }

    async function loadSessions() {
        const res = await fetch(BASE_URL + '/sessions');
        if (!res.ok) return;
        allSessions = await res.json();
        renderSessions('');
    }

    function renderSessions(filter) {
        const container = document.getElementById('sessions-container');
        const noSessions = document.getElementById('no-sessions');
        const noResults = document.getElementById('no-results');

        noSessions.classList.add('d-none');
        noResults.classList.add('d-none');

        if (allSessions.length === 0) {
            noSessions.classList.remove('d-none');
            return;
        }

        const filtered = filter
            ? allSessions.filter(s => s.course.toLowerCase().includes(filter))
            : allSessions;

        if (filtered.length === 0) {
            container.innerHTML = '';
            noResults.classList.remove('d-none');
            return;
        }

        container.innerHTML = filtered.map(renderCard).join('');
    }

    function renderCard(session) {
        const sid = session._id || session.id;
        const spotsLeft = session.capacity - session.enrolled_count;
        const isFull = spotsLeft <= 0;
        const isHost = session.host === getUsername();
        const isEnrolled = currentUserId && (session.enrolled_users || []).includes(currentUserId);

        let actionBtn = '';
        if (!isLoggedIn()) {
            actionBtn = '<a href="login.html" class="btn btn-outline-primary btn-sm">Login to join</a>';
        } else if (isHost) {
            actionBtn = '<span class="badge bg-secondary">Your session</span>';
        } else if (isEnrolled) {
            actionBtn = `<button class="btn btn-outline-danger btn-sm" onclick="handleLeave('${sid}')">Leave</button>`;
        } else if (isFull) {
            actionBtn = '<button class="btn btn-secondary btn-sm" disabled>Full</button>';
        } else {
            actionBtn = `<button class="btn btn-primary btn-sm" onclick="handleJoin('${sid}')">Join</button>`;
        }

        const typeBadge = session.type === 'online'
            ? '<span class="badge bg-success">Online</span>'
            : '<span class="badge bg-info text-dark">In-Person</span>';

        return `
            <div class="col-md-6 col-lg-4" id="card-${sid}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0">${session.course}</h5>
                            ${typeBadge}
                        </div>
                        <p class="text-muted small mb-1">Hosted by <strong>${session.host}</strong></p>
                        <p class="card-text mb-1">${session.date} &nbsp;|&nbsp; ${session.time}</p>
                        <p class="card-text text-muted small text-truncate mb-3">${session.location}</p>
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted small" id="spots-${sid}">
                                    ${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} left
                                </span>
                                <div id="btn-${sid}">${actionBtn}</div>
                            </div>
                            <div id="error-${sid}" class="text-danger small mt-1 d-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    async function handleJoin(sid) {
        const btnEl = document.getElementById('btn-' + sid);
        const errorEl = document.getElementById('error-' + sid);
        errorEl.classList.add('d-none');
        btnEl.innerHTML = '<button class="btn btn-primary btn-sm" disabled>Joining...</button>';

        const res = await fetch(BASE_URL + '/sessions/' + sid + '/join', {
            method: 'POST',
            headers: authHeaders()
        });
        const data = await res.json();

        if (!res.ok) {
            errorEl.textContent = data.detail || 'Could not join session.';
            errorEl.classList.remove('d-none');
            btnEl.innerHTML = `<button class="btn btn-primary btn-sm" onclick="handleJoin('${sid}')">Join</button>`;
            return;
        }

        const session = allSessions.find(s => (s._id || s.id) === sid);
        if (session) {
            session.enrolled_count = data.enrolled_count;
            if (!session.enrolled_users) session.enrolled_users = [];
            session.enrolled_users.push(currentUserId);
        }

        const spotsLeft = session.capacity - data.enrolled_count;
        document.getElementById('spots-' + sid).textContent =
            spotsLeft + ' spot' + (spotsLeft !== 1 ? 's' : '') + ' left';
        btnEl.innerHTML = `<button class="btn btn-outline-danger btn-sm" onclick="handleLeave('${sid}')">Leave</button>`;
    }

    async function handleLeave(sid) {
        const btnEl = document.getElementById('btn-' + sid);
        const errorEl = document.getElementById('error-' + sid);
        errorEl.classList.add('d-none');
        btnEl.innerHTML = '<button class="btn btn-outline-danger btn-sm" disabled>Leaving...</button>';

        const res = await fetch(BASE_URL + '/sessions/' + sid + '/leave', {
            method: 'POST',
            headers: authHeaders()
        });
        const data = await res.json();

        if (!res.ok) {
            errorEl.textContent = data.detail || 'Could not leave session.';
            errorEl.classList.remove('d-none');
            btnEl.innerHTML = `<button class="btn btn-outline-danger btn-sm" onclick="handleLeave('${sid}')">Leave</button>`;
            return;
        }

        const session = allSessions.find(s => (s._id || s.id) === sid);
        if (session) {
            session.enrolled_count = data.enrolled_count;
            session.enrolled_users = (session.enrolled_users || []).filter(id => id !== currentUserId);
        }

        const spotsLeft = session.capacity - data.enrolled_count;
        document.getElementById('spots-' + sid).textContent =
            spotsLeft + ' spot' + (spotsLeft !== 1 ? 's' : '') + ' left';
        btnEl.innerHTML = `<button class="btn btn-primary btn-sm" onclick="handleJoin('${sid}')">Join</button>`;
    }

    init();
</script>

</body>
</html>
