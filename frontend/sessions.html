<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Sessions — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">StudyMatch</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="sessions.html">Browse Sessions</a></li>
                <li class="nav-item"><a class="nav-link" href="post-session.html">Post Session</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">My Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
            </ul>
            <div id="nav-guest" class="d-none">
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="register.html" class="btn btn-light">Register</a>
            </div>
            <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                <span class="text-white">Hi, <strong id="nav-username"></strong></span>
                <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Browse Sessions</h2>
        <a href="post-session.html" class="btn btn-primary">+ Post Session</a>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    <div id="sessions-list" class="row g-3"></div>

    <p id="no-sessions" class="d-none text-center text-muted mt-5">
        No study sessions posted yet. Be the first!
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script>
    let currentUserId = null;

    async function init() {
        if (isLoggedIn()) {
            const res = await fetch(BASE_URL + '/users/me', { headers: authHeaders() });
            if (res.ok) {
                const me = await res.json();
                currentUserId = me.id;
            }
        }
        await loadSessions();
    }

    async function loadSessions() {
        const res = await fetch(BASE_URL + '/sessions');
        if (!res.ok) {
            showError('Failed to load sessions.');
            return;
        }

        const sessions = await res.json();
        const list = document.getElementById('sessions-list');

        if (sessions.length === 0) {
            document.getElementById('no-sessions').classList.remove('d-none');
            return;
        }

        list.innerHTML = sessions.map(renderCard).join('');

        list.querySelectorAll('[data-join]').forEach(btn => {
            btn.addEventListener('click', () => handleJoin(btn.dataset.join, btn));
        });
        list.querySelectorAll('[data-leave]').forEach(btn => {
            btn.addEventListener('click', () => handleLeave(btn.dataset.leave, btn));
        });
    }

    function renderCard(session) {
        const sessionId = session.id || session._id;
        const isFull = session.enrolled_count >= session.capacity;
        const isEnrolled = currentUserId && (session.enrolled_users || []).includes(currentUserId);
        const isHost = currentUserId && session.host_id === currentUserId;

        let actionBtn = '';
        if (isHost) {
            actionBtn = '<span class="badge bg-secondary">Your session</span>';
        } else if (isEnrolled) {
            actionBtn = `<button class="btn btn-outline-danger btn-sm" data-leave="${sessionId}">Leave</button>`;
        } else if (isFull) {
            actionBtn = '<button class="btn btn-secondary btn-sm" disabled>Full</button>';
        } else if (isLoggedIn()) {
            actionBtn = `<button class="btn btn-primary btn-sm" data-join="${sessionId}">Join</button>`;
        } else {
            actionBtn = '<a href="login.html" class="btn btn-outline-primary btn-sm">Login to Join</a>';
        }

        const typeBadge = session.type === 'online'
            ? '<span class="badge bg-success">Online</span>'
            : '<span class="badge bg-info text-dark">In-Person</span>';

        return `
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0">${session.course}</h5>
                            ${typeBadge}
                        </div>
                        <p class="text-muted small mb-1">Hosted by <strong>${session.host}</strong></p>
                        <p class="card-text mb-1">${session.date} &nbsp;|&nbsp; ${session.time}</p>
                        <p class="card-text text-truncate text-muted small mb-3">${session.location}</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="text-muted small">${session.enrolled_count} / ${session.capacity} joined</span>
                            ${actionBtn}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    async function handleJoin(sessionId, btn) {
        btn.disabled = true;
        const res = await fetch(BASE_URL + '/sessions/' + sessionId + '/join', {
            method: 'POST',
            headers: authHeaders()
        });
        const data = await res.json();
        if (!res.ok) {
            showError(data.detail || 'Could not join session.');
            btn.disabled = false;
            return;
        }
        await loadSessions();
    }

    async function handleLeave(sessionId, btn) {
        btn.disabled = true;
        const res = await fetch(BASE_URL + '/sessions/' + sessionId + '/leave', {
            method: 'POST',
            headers: authHeaders()
        });
        const data = await res.json();
        if (!res.ok) {
            showError(data.detail || 'Could not leave session.');
            btn.disabled = false;
            return;
        }
        await loadSessions();
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    init();
</script>

</body>
</html>
