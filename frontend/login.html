<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">StudyMatch</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="sessions.html">Browse Sessions</a></li>
                <li class="nav-item"><a class="nav-link" href="post-session.html">Post Session</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">My Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
            </ul>
            <div id="nav-guest" class="d-none">
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="register.html" class="btn btn-light">Register</a>
            </div>
            <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                <span class="text-white">Hi, <strong id="nav-username"></strong></span>
                <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm ms-2">☾</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title mb-4">Login</h2>

                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email or Username</label>
                            <input type="text" class="form-control" id="email" placeholder="you@uni.edu or your username">
                            <div class="text-danger small mt-1" id="err-email"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password">
                            <div class="text-danger small mt-1" id="err-password"></div>
                        </div>

                        <div id="error-msg" class="alert alert-danger d-none"></div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Don't have an account? <a href="register.html">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script>
  function validateLoginForm() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    document.getElementById('err-email').textContent = '';
    document.getElementById('err-password').textContent = '';

    let valid = true;

    if (!email) {
      document.getElementById('err-email').textContent = 'Email or username is required.';
      valid = false;
    } else if (email.includes('@') && !emailRegex.test(email)) {
      document.getElementById('err-email').textContent = 'Invalid email format.';
      valid = false;
    }

    if (!password) {
      document.getElementById('err-password').textContent = 'Password is required.';
      valid = false;
    } else if (password.length < 6) {
      document.getElementById('err-password').textContent = 'Password must be at least 6 characters.';
      valid = false;
    }

    return valid;
  }

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    if (!validateLoginForm()) return;

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    errorMsg.classList.add('d-none');

    const res = await fetch(BASE_URL + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorMsg.textContent = data.detail || 'Login failed. Please try again.';
      errorMsg.classList.remove('d-none');
      return;
    }

    localStorage.setItem('token', data.access_token);

    // fetch username separately since the login response only returns a token
    const meRes = await fetch(BASE_URL + '/users/me', {
      headers: { 'Authorization': 'Bearer ' + data.access_token }
    });
    const meData = await meRes.json();
    localStorage.setItem('username', meData.username);

    window.location.href = 'sessions.html';
  });
</script>

</body>
</html>
