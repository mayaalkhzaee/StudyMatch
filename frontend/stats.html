<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .chart-box    { position: relative; height: 220px; }
        .chart-box-sm { position: relative; height: 190px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">StudyMatch</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="sessions.html">Browse Sessions</a></li>
                <li class="nav-item"><a class="nav-link" href="post-session.html">Post Session</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">My Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="stats.html">Stats</a></li>
            </ul>
            <div id="nav-guest" class="d-none">
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="register.html" class="btn btn-light">Register</a>
            </div>
            <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                <span class="text-white">Hi, <strong id="nav-username"></strong></span>
                <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm ms-2">☾</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Platform Statistics</h2>

    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted mt-2">Loading stats...</p>
    </div>

    <div id="stats-content" class="d-none">

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card shadow-sm text-center h-100">
                    <div class="card-body py-3">
                        <i class="bi bi-calendar3 text-primary mb-1" style="font-size:1.6rem;"></i>
                        <h2 class="fw-bold mb-0 mt-1" id="stat-total-sessions">—</h2>
                        <p class="text-muted mb-0 mt-1 small">Total Sessions</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm text-center h-100">
                    <div class="card-body py-3">
                        <i class="bi bi-mortarboard text-success mb-1" style="font-size:1.6rem;"></i>
                        <h2 class="fw-bold mb-0 mt-1" id="stat-total-courses">—</h2>
                        <p class="text-muted mb-0 mt-1 small">Unique Courses</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm text-center h-100">
                    <div class="card-body py-3">
                        <i class="bi bi-award text-warning mb-1" style="font-size:1.6rem;"></i>
                        <h2 class="fw-bold mb-0 mt-1" id="stat-top-participant">—</h2>
                        <p class="text-muted mb-0 mt-1 small">Most Active</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Top Courses by Sessions</h5>
                        <div id="top-courses-container" class="chart-box"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Sessions Per Week</h5>
                        <div id="sessions-per-day-container" class="chart-box"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-5">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Session Types</h5>
                        <div id="session-types-container" class="chart-box-sm"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Top Participants</h5>
                        <div id="participants-chart-container" class="chart-box-sm"></div>
                        <div class="mt-3" id="participants-table-container"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script>
  const CHART_ANIM = { duration: 1000, easing: 'easeInOutQuart' };
  const PALETTE = [
    'rgba(13, 110, 253, 0.75)',
    'rgba(111, 66, 193, 0.75)',
    'rgba(214, 51, 132, 0.75)',
    'rgba(220, 53, 69, 0.75)',
    'rgba(253, 126, 20, 0.75)',
    'rgba(255, 193, 7, 0.75)',
    'rgba(25, 135, 84, 0.75)',
    'rgba(13, 202, 240, 0.75)',
    'rgba(102, 16, 242, 0.75)',
    'rgba(32, 201, 151, 0.75)',
  ];

  async function init() {
    let data = { top_courses: [], sessions_per_week: [], top_participants: [] };
    let sessions = [];

    try {
      // fetch both endpoints at the same time
      const [statsRes, sessionsRes] = await Promise.all([
        fetch(BASE_URL + '/stats'),
        fetch(BASE_URL + '/sessions')
      ]);
      if (statsRes.ok) data = await statsRes.json();
      if (sessionsRes.ok) sessions = await sessionsRes.json();
    } catch (e) {}

    document.getElementById('loading').classList.add('d-none');
    document.getElementById('stats-content').classList.remove('d-none');

    renderSummaryCards(data);
    renderTopCourses(data.top_courses || []);
    renderSessionsPerDay(data.sessions_per_week || []);
    renderSessionTypes(sessions);
    renderTopParticipants(data.top_participants || []);
  }

  function renderSummaryCards(data) {
    const courses = data.top_courses || [];
    const totalSessions = courses.reduce((sum, c) => sum + c.session_count, 0);
    const top = (data.top_participants || [])[0];
    document.getElementById('stat-total-sessions').textContent = totalSessions || '—';
    document.getElementById('stat-total-courses').textContent = courses.length || '—';
    document.getElementById('stat-top-participant').textContent = top ? top.username : '—';
  }

  function renderTopCourses(data) {
    const container = document.getElementById('top-courses-container');
    if (!data.length) {
      container.innerHTML = '<p class="text-muted text-center py-4">No data yet.</p>';
      return;
    }
    container.innerHTML = '<canvas id="top-courses-chart"></canvas>';
    new Chart(document.getElementById('top-courses-chart'), {
      type: 'bar',
      data: {
        labels: data.map(c => c.course),
        datasets: [{
          label: 'Sessions',
          data: data.map(c => c.session_count),
          backgroundColor: data.map((_, i) => PALETTE[i % PALETTE.length]),
          borderColor: data.map((_, i) => PALETTE[i % PALETTE.length].replace('0.75', '1')),
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        animation: CHART_ANIM,
        plugins: {
          legend: { display: false },
          datalabels: { anchor: 'end', align: 'end', font: { weight: 'bold' } }
        },
        scales: {
          x: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  function renderSessionsPerDay(data) {
    const container = document.getElementById('sessions-per-day-container');
    if (!data.length) {
      container.innerHTML = '<p class="text-muted text-center py-4">No data yet.</p>';
      return;
    }
    container.innerHTML = '<canvas id="sessions-per-day-chart"></canvas>';
    new Chart(document.getElementById('sessions-per-day-chart'), {
      type: 'line',
      data: {
        labels: data.map(d => d.week),
        datasets: [{
          label: 'Sessions',
          data: data.map(d => d.count),
          borderColor: 'rgba(25, 135, 84, 1)',
          backgroundColor: 'rgba(25, 135, 84, 0.15)',
          borderWidth: 2,
          tension: 0.4,
          fill: true,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: 'rgba(25, 135, 84, 1)'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: CHART_ANIM,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
      }
    });
  }

  function renderSessionTypes(sessions) {
    const container = document.getElementById('session-types-container');
    if (!sessions.length) {
      container.innerHTML = '<p class="text-muted text-center py-4">No data yet.</p>';
      return;
    }
    const online = sessions.filter(s => s.type === 'online').length;
    const inPerson = sessions.filter(s => s.type === 'in-person').length;
    container.innerHTML = '<canvas id="session-types-chart"></canvas>';
    new Chart(document.getElementById('session-types-chart'), {
      type: 'doughnut',
      data: {
        labels: ['Online', 'In-Person'],
        datasets: [{
          data: [online, inPerson],
          backgroundColor: ['rgba(13, 110, 253, 0.8)', 'rgba(25, 135, 84, 0.8)'],
          borderColor: ['rgba(13, 110, 253, 1)', 'rgba(25, 135, 84, 1)'],
          borderWidth: 2,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: CHART_ANIM,
        plugins: { legend: { position: 'bottom' } }
      }
    });
  }

  function renderTopParticipants(data) {
    const chartContainer = document.getElementById('participants-chart-container');
    const tableContainer = document.getElementById('participants-table-container');

    if (!data.length) {
      chartContainer.innerHTML = '';
      tableContainer.innerHTML = '<p class="text-muted text-center py-3">No data yet.</p>';
      return;
    }

    chartContainer.innerHTML = '<canvas id="participants-chart"></canvas>';
    new Chart(document.getElementById('participants-chart'), {
      type: 'bar',
      data: {
        labels: data.map(p => p.username),
        datasets: [{
          label: 'Sessions Joined',
          data: data.map(p => p.joined_count),
          backgroundColor: data.map((_, i) => PALETTE[i % PALETTE.length]),
          borderColor: data.map((_, i) => PALETTE[i % PALETTE.length].replace('0.75', '1')),
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        animation: CHART_ANIM,
        plugins: {
          legend: { display: false },
          datalabels: { anchor: 'end', align: 'end', font: { weight: 'bold' } }
        },
        scales: {
          x: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
      },
      plugins: [ChartDataLabels]
    });

    tableContainer.innerHTML = `
      <table class="table table-sm table-hover mb-0">
        <thead>
          <tr><th>#</th><th>Username</th><th>Sessions Joined</th></tr>
        </thead>
        <tbody>
          ${data.map((p, i) => `
            <tr>
              <td class="text-muted">${i + 1}</td>
              <td><strong>${p.username}</strong></td>
              <td>${p.joined_count}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  init();
</script>

</body>
</html>
