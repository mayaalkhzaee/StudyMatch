<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">StudyMatch</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="sessions.html">Browse Sessions</a></li>
                    <li class="nav-item"><a class="nav-link" href="post-session.html">Post Session</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">My Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="stats.html">Stats</a></li>
                </ul>
                <div id="nav-guest" class="d-none">
                    <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                    <a href="register.html" class="btn btn-light">Register</a>
                </div>
                <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                    <span class="text-white">Hi, <strong id="nav-username"></strong></span>
                    <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
                </div>
                <button id="theme-toggle" class="btn btn-outline-light btn-sm ms-2">☾</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="mb-4">Platform Statistics</h2>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-2">Loading stats...</p>
        </div>

        <div id="stats-content" class="d-none">

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Top Courses by Sessions</h5>
                            <div id="top-courses-container"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Sessions Per Day</h5>
                            <div id="sessions-per-day-container"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Top Participants</h5>
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Username</th>
                                        <th>Sessions Joined</th>
                                    </tr>
                                </thead>
                                <tbody id="participants-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        async function init() {
            let data = { top_courses: [], sessions_per_week: [], top_participants: [] };
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const res = await fetch(BASE_URL + '/stats');
                if (res.ok) data = await res.json();
            } catch (e) {
                // fetch failed — data stays as empty defaults, sections show "No data yet"
            }

            document.getElementById('loading').classList.add('d-none');
            document.getElementById('stats-content').classList.remove('d-none');

            renderTopCourses(data.top_courses || []);
            renderSessionsPerDay(data.sessions_per_week || []);
            renderTopParticipants(data.top_participants || []);
        }

        function renderTopCourses(data) {
            const container = document.getElementById('top-courses-container');
            if (!data.length) {
                container.innerHTML = '<p class="text-muted text-center py-4">No data yet.</p>';
                return;
            }
            container.innerHTML = '<canvas id="top-courses-chart"></canvas>';
            new Chart(document.getElementById('top-courses-chart'), {
                type: 'bar',
                data: {
                    labels: data.map(c => c.course),
                    datasets: [{
                        label: 'Sessions',
                        data: data.map(c => c.session_count),
                        backgroundColor: 'rgba(13, 110, 253, 0.75)',
                        borderColor: 'rgba(13, 110, 253, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });
        }

        function renderSessionsPerDay(data) {
            const container = document.getElementById('sessions-per-day-container');
            if (!data.length) {
                container.innerHTML = '<p class="text-muted text-center py-4">No data yet.</p>';
                return;
            }
            container.innerHTML = '<canvas id="sessions-per-day-chart"></canvas>';
            new Chart(document.getElementById('sessions-per-day-chart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.week),
                    datasets: [{
                        label: 'Sessions',
                        data: data.map(d => d.count),
                        borderColor: 'rgba(25, 135, 84, 1)',
                        backgroundColor: 'rgba(25, 135, 84, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });
        }

        function renderTopParticipants(data) {
            const tbody = document.getElementById('participants-tbody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-3">No data yet.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((p, i) => `
            <tr>
                <td class="text-muted">${i + 1}</td>
                <td><strong>${p.username}</strong></td>
                <td>${p.joined_count}</td>
            </tr>
        `).join('');
        }

        init();
    </script>

</body>

</html>
