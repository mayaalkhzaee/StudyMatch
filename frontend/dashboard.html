<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.4s ease both;
            animation-delay: var(--anim-delay, 0ms);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15) !important;
        }

        .btn {
            transition: all 0.2s ease;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">StudyMatch</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="sessions.html">Browse Sessions</a></li>
                    <li class="nav-item"><a class="nav-link" href="post-session.html">Post Session</a></li>
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">My Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
                </ul>
                <div id="nav-guest" class="d-none">
                    <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                    <a href="register.html" class="btn btn-light">Register</a>
                </div>
                <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                    <a href="profile.html" class="text-white text-decoration-none me-2">
                        Hi, <strong id="nav-username"></strong>
                    </a>
                    <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
                </div>
                <button id="theme-toggle" class="btn btn-outline-light btn-sm ms-2">☾</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h4 class="mb-1" id="profile-username">Loading...</h4>
                <p class="text-muted mb-0" id="profile-email"></p>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="dashboard-tabs">
            <li class="nav-item">
                <button class="nav-link active" id="tab-list">List View</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-calendar">Calendar View</button>
            </li>
        </ul>

        <div id="list-view">
            <div id="recommended-section">
                <h4 class="mb-3">Recommended For You</h4>
                <div id="recommended-container" class="row g-3 mb-5"></div>
            </div>

            <h4 class="mb-3">Sessions I'm Hosting</h4>
            <div id="hosted-container" class="row g-3 mb-5"></div>

            <h4 class="mb-3">Sessions I've Joined</h4>
            <div id="joined-container" class="row g-3 mb-5"></div>
        </div>

        <div id="calendar-view" class="d-none">
            <div id="dashboard-calendar"></div>
        </div>

    </div>

    <div class="modal fade" id="edit-modal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Session</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form">
                        <div class="mb-3">
                            <label for="edit-course" class="form-label">Course</label>
                            <input type="text" class="form-control" id="edit-course">
                            <div class="text-danger small mt-1" id="err-edit-course"></div>
                        </div>
                        <div class="mb-3">
                            <label for="edit-type" class="form-label">Session Type</label>
                            <select class="form-select" id="edit-type">
                                <option value="online">Online</option>
                                <option value="in-person">In-Person</option>
                            </select>
                            <div class="text-danger small mt-1" id="err-edit-type"></div>
                        </div>
                        <div class="mb-3">
                            <label for="edit-location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="edit-location">
                            <div class="text-danger small mt-1" id="err-edit-location"></div>
                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label for="edit-date" class="form-label">Date</label>
                                <input type="date" class="form-control" id="edit-date">
                                <div class="text-danger small mt-1" id="err-edit-date"></div>
                            </div>
                            <div class="col mb-3">
                                <label for="edit-time" class="form-label">Time</label>
                                <input type="time" class="form-control" id="edit-time">
                                <div class="text-danger small mt-1" id="err-edit-time"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="edit-capacity" class="form-label">Capacity</label>
                            <input type="number" class="form-control" id="edit-capacity">
                            <div class="text-danger small mt-1" id="err-edit-capacity"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="edit-form" class="btn btn-primary">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
        <div id="toast-el" class="toast align-items-center border-0 text-white" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/auth.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script>
        let currentEditId = null;
        let mySessions = [];
        let joinedSessions = [];
        let dashCalendar = null;
        let activePopover = null;
        const TODAY = new Date().toISOString().split('T')[0];

        function showToast(message, isSuccess) {
            const toastEl = document.getElementById('toast-el');
            document.getElementById('toast-body').textContent = message;
            toastEl.className = 'toast align-items-center border-0 text-white ' + (isSuccess ? 'bg-success' : 'bg-danger');
            bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3000 }).show();
        }

        function progressBar(enrolled, capacity) {
            const pct = capacity > 0 ? Math.round((enrolled / capacity) * 100) : 0;
            const ratio = capacity > 0 ? (capacity - enrolled) / capacity : 0;
            const color = ratio > 0.5 ? 'bg-success' : ratio >= 0.25 ? 'bg-warning' : 'bg-danger';
            return `
      <div class="progress" style="height: 8px;">
        <div class="progress-bar ${color}" role="progressbar" style="width: ${pct}%"></div>
      </div>
      <p class="text-muted small mb-0 mt-1">${enrolled} / ${capacity} spots filled</p>
    `;
        }

        function closeActivePopover() {
            if (activePopover) {
                activePopover.dispose();
                activePopover = null;
            }
        }

        function initDashboardCalendar() {
            const calEl = document.getElementById('dashboard-calendar');

            if (dashCalendar) {
                dashCalendar.destroy();
                dashCalendar = null;
            }

            const hostedEvents = mySessions.map(s => ({
                id: s._id,
                title: s.course,
                start: s.date + 'T' + s.time,
                color: '#0d6efd',
                extendedProps: { course: s.course, date: s.date, time: s.time, location: s.location, isJoined: false, sid: s._id }
            }));

            // j- stops joined events clashing with hosted events if they have the same id
            const joinedEvents = joinedSessions.map(s => ({
                id: 'j-' + (s._id || s.id),
                title: s.course,
                start: s.date + 'T' + s.time,
                color: '#198754',
                extendedProps: { course: s.course, date: s.date, time: s.time, location: s.location, isJoined: true, sid: s._id || s.id }
            }));

            dashCalendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listWeek'
                },
                height: 'auto',
                slotMinTime: '07:00:00',
                scrollTime: '07:00:00',
                events: hostedEvents.concat(joinedEvents),
                eventClick: function (info) {
                    closeActivePopover();
                    const p = info.event.extendedProps;
                    const leaveBtn = p.isJoined
                        ? `<div class="mt-2"><button class="btn btn-sm btn-outline-danger" onclick="handleDashLeave('${p.sid}')">Leave</button></div>`
                        : '';
                    activePopover = new bootstrap.Popover(info.el, {
                        title: p.course,
                        content: `${p.date} | ${p.time}<br>${p.location}${leaveBtn}`,
                        html: true,
                        placement: 'top',
                        trigger: 'manual'
                    });
                    activePopover.show();
                    info.jsEvent.stopPropagation();
                }
            });

            dashCalendar.render();
        }

        async function init() {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            // fetch profile, hosted sessions, and joined sessions from backend at the same time
            const [profileRes, mySessionsRes, joinedRes] = await Promise.all([
                fetch(BASE_URL + '/users/me', { headers: authHeaders() }),
                fetch(BASE_URL + '/users/me/sessions', { headers: authHeaders() }),
                fetch(BASE_URL + '/users/me/joined', { headers: authHeaders() })
            ]);

            const profile = await profileRes.json();
            mySessions = await mySessionsRes.json();
            joinedSessions = await joinedRes.json();

            document.getElementById('profile-username').textContent = profile.username;
            document.getElementById('profile-email').textContent = profile.email;

            renderHostedSessions();
            renderJoinedSessions();
            await loadRecommendations();

            document.getElementById('tab-list').addEventListener('click', function () {
                this.classList.add('active');
                document.getElementById('tab-calendar').classList.remove('active');
                document.getElementById('list-view').classList.remove('d-none');
                document.getElementById('calendar-view').classList.add('d-none');
                closeActivePopover();
            });

            document.getElementById('tab-calendar').addEventListener('click', function () {
                this.classList.add('active');
                document.getElementById('tab-list').classList.remove('active');
                document.getElementById('list-view').classList.add('d-none');
                document.getElementById('calendar-view').classList.remove('d-none');
                initDashboardCalendar();
            });

            document.addEventListener('click', function () {
                closeActivePopover();
            });
        }

        function typeBadge(type) {
            return type === 'online'
                ? '<span class="badge bg-success">Online</span>'
                : '<span class="badge bg-info text-dark">In-Person</span>';
        }

        function renderHostedSessions() {
            const container = document.getElementById('hosted-container');
            if (mySessions.length === 0) {
                container.innerHTML = '<p class="text-muted">You haven\'t posted any sessions yet. <a href="post-session.html">Post one!</a></p>';
                return;
            }
            container.innerHTML = mySessions.map((s, i) => renderHostCard(s, i)).join('');
        }

        function renderHostCard(session, index = 0) {
            const sid = session._id;
            const isPast = session.date < TODAY;
            const statusBadge = isPast
                ? '<span class="badge bg-secondary">Past</span>'
                : '<span class="badge bg-success">Upcoming</span>';
            return `
      <div class="col-md-6 col-lg-4" id="host-card-${sid}" style="--anim-delay: ${index * 80}ms">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title mb-0">${session.course}</h5>
              <div class="d-flex gap-1 flex-wrap justify-content-end">
                ${statusBadge}
                ${typeBadge(session.type)}
              </div>
            </div>
            <p class="card-text mb-1">${session.date} &nbsp;|&nbsp; ${session.time}</p>
            <p class="card-text text-muted small text-truncate mb-2">${session.location}</p>
            <div class="mb-3">
              ${progressBar(session.enrolled_count, session.capacity)}
            </div>
            <div class="mt-auto d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm" onclick="openEditModal('${sid}')">Edit</button>
              <button class="btn btn-outline-danger btn-sm" onclick="handleDelete('${sid}')">Delete</button>
            </div>
          </div>
        </div>
      </div>
    `;
        }

        function renderJoinedSessions() {
            const container = document.getElementById('joined-container');
            if (joinedSessions.length === 0) {
                container.innerHTML = '<p class="text-muted">You haven\'t joined any sessions yet. <a href="sessions.html">Browse sessions!</a></p>';
                return;
            }
            container.innerHTML = joinedSessions.map((s, i) => renderJoinedCard(s, i)).join('');
        }

        function renderJoinedCard(session, index = 0) {
            const sid = session._id;
            const isPast = session.date < TODAY;
            const statusBadge = isPast
                ? '<span class="badge bg-secondary">Past</span>'
                : '<span class="badge bg-success">Upcoming</span>';
            return `
      <div class="col-md-6 col-lg-4" id="joined-card-${sid}" style="--anim-delay: ${index * 80}ms">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title mb-0">${session.course}</h5>
              <div class="d-flex gap-1 flex-wrap justify-content-end">
                ${statusBadge}
                ${typeBadge(session.type)}
              </div>
            </div>
            <p class="text-muted small mb-1">Hosted by <strong>${session.host}</strong></p>
            <p class="card-text mb-1">${session.date} &nbsp;|&nbsp; ${session.time}</p>
            <p class="card-text text-muted small text-truncate mb-2">${session.location}</p>
            <div class="mb-3">
              ${progressBar(session.enrolled_count, session.capacity)}
            </div>
            <div class="mt-auto d-flex justify-content-end">
              <button class="btn btn-outline-danger btn-sm" onclick="handleLeave('${sid}')">Leave</button>
            </div>
          </div>
        </div>
      </div>
    `;
        }

        async function loadRecommendations() {
            const res = await fetch(BASE_URL + '/sessions/recommended', { headers: authHeaders() });
            if (!res.ok) return;
            const recommendations = await res.json();

            const container = document.getElementById('recommended-container');
            if (recommendations.length === 0) {
                container.innerHTML = '<p class="text-muted">Join a session first to get recommendations!</p>';
                return;
            }
            container.innerHTML = recommendations.slice(0, 3).map((s, i) => renderRecommendedCard(s, i)).join('');
        }

        function renderRecommendedCard(session, index = 0) {
            const sid = session._id || session.id;
            const isFull = session.capacity - session.enrolled_count <= 0;
            return `
      <div class="col-md-6 col-lg-4" id="rec-card-${sid}" style="--anim-delay: ${index * 80}ms">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title mb-0">${session.course}</h5>
              ${typeBadge(session.type)}
            </div>
            <p class="text-muted small mb-1">Hosted by <strong>${session.host}</strong></p>
            <p class="card-text mb-1">${session.date} &nbsp;|&nbsp; ${session.time}</p>
            <p class="card-text text-muted small text-truncate mb-2">${session.location}</p>
            <div class="mb-3">
              ${progressBar(session.enrolled_count, session.capacity)}
            </div>
            <div class="mt-auto d-flex justify-content-end">
              ${isFull
                    ? '<button class="btn btn-secondary btn-sm" disabled>Full</button>'
                    : `<button class="btn btn-primary btn-sm" id="rec-btn-${sid}" onclick="handleRecommendedJoin('${sid}')">Join</button>`
                }
            </div>
          </div>
        </div>
      </div>
    `;
        }

        async function handleRecommendedJoin(sid) {
            const btn = document.getElementById('rec-btn-' + sid);
            btn.disabled = true;
            btn.textContent = 'Joining...';

            const res = await fetch(BASE_URL + '/sessions/' + sid + '/join', {
                method: 'POST',
                headers: authHeaders()
            });
            const data = await res.json();

            if (!res.ok) {
                btn.disabled = false;
                btn.textContent = 'Join';
                showToast(data.detail || 'Could not join session.', false);
                return;
            }

            document.getElementById('rec-card-' + sid).remove();
            showToast('Successfully joined the session!', true);
        }

        async function handleDelete(sid) {
            if (!confirm('Are you sure you want to delete this session? This cannot be undone.')) return;

            const res = await fetch(BASE_URL + '/sessions/' + sid, {
                method: 'DELETE',
                headers: authHeaders()
            });

            if (!res.ok) {
                const data = await res.json();
                showToast(data.detail || 'Could not delete session.', false);
                return;
            }

            document.getElementById('host-card-' + sid).remove();
            mySessions = mySessions.filter(s => s._id !== sid);
            showToast('Session deleted.', true);
        }

        async function handleDashLeave(sid) {
            closeActivePopover();
            const res = await fetch(BASE_URL + '/sessions/' + sid + '/leave', {
                method: 'POST',
                headers: authHeaders()
            });

            if (!res.ok) {
                const data = await res.json();
                showToast(data.detail || 'Could not leave session.', false);
                return;
            }

            joinedSessions = joinedSessions.filter(s => (s._id || s.id) !== sid);
            const card = document.getElementById('joined-card-' + sid);
            if (card) card.remove();
            initDashboardCalendar();
            showToast('Left the session.', true);
        }

        async function handleLeave(sid) {
            const res = await fetch(BASE_URL + '/sessions/' + sid + '/leave', {
                method: 'POST',
                headers: authHeaders()
            });

            if (!res.ok) {
                const data = await res.json();
                showToast(data.detail || 'Could not leave session.', false);
                return;
            }

            document.getElementById('joined-card-' + sid).remove();
            joinedSessions = joinedSessions.filter(s => s._id !== sid);
            showToast('Left the session.', true);
        }

        function validateEditForm() {
            const course = document.getElementById('edit-course').value.trim();
            const type = document.getElementById('edit-type').value;
            const location = document.getElementById('edit-location').value.trim();
            const date = document.getElementById('edit-date').value;
            const time = document.getElementById('edit-time').value;
            const capacity = document.getElementById('edit-capacity').value;

            ['course', 'type', 'location', 'date', 'time', 'capacity'].forEach(f => {
                document.getElementById('err-edit-' + f).textContent = '';
            });

            const today = new Date().toISOString().split('T')[0];
            let valid = true;

            if (!course || course.length < 2) {
                document.getElementById('err-edit-course').textContent = 'Course must be at least 2 characters.';
                valid = false;
            }
            if (!type || !['online', 'in-person'].includes(type)) {
                document.getElementById('err-edit-type').textContent = 'Please select a session type.';
                valid = false;
            }
            if (!location || location.length < 3) {
                document.getElementById('err-edit-location').textContent = 'Location must be at least 3 characters.';
                valid = false;
            }
            if (!date) {
                document.getElementById('err-edit-date').textContent = 'Date is required.';
                valid = false;
            } else if (date < today) {
                document.getElementById('err-edit-date').textContent = 'Date must be today or in the future.';
                valid = false;
            }
            if (!time) {
                document.getElementById('err-edit-time').textContent = 'Time is required.';
                valid = false;
            }
            const cap = parseInt(capacity);
            if (!capacity) {
                document.getElementById('err-edit-capacity').textContent = 'Capacity is required.';
                valid = false;
            } else if (isNaN(cap) || cap < 1) {
                document.getElementById('err-edit-capacity').textContent = 'Capacity must be at least 1.';
                valid = false;
            } else if (cap > 50) {
                document.getElementById('err-edit-capacity').textContent = 'Capacity cannot exceed 50.';
                valid = false;
            }

            return valid;
        }

        function openEditModal(sid) {
            currentEditId = sid;
            const session = mySessions.find(s => s._id === sid);

            document.getElementById('edit-course').value = session.course;
            document.getElementById('edit-type').value = session.type;
            document.getElementById('edit-location').value = session.location;
            document.getElementById('edit-date').value = session.date;
            document.getElementById('edit-time').value = session.time;
            document.getElementById('edit-capacity').value = session.capacity;
            ['course', 'type', 'location', 'date', 'time', 'capacity'].forEach(f => {
                document.getElementById('err-edit-' + f).textContent = '';
            });

            new bootstrap.Modal(document.getElementById('edit-modal')).show();
        }

        document.getElementById('edit-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!validateEditForm()) return;

            const body = {
                course: document.getElementById('edit-course').value.trim(),
                type: document.getElementById('edit-type').value,
                location: document.getElementById('edit-location').value.trim(),
                date: document.getElementById('edit-date').value,
                time: document.getElementById('edit-time').value,
                capacity: parseInt(document.getElementById('edit-capacity').value)
            };

            const res = await fetch(BASE_URL + '/sessions/' + currentEditId, {
                method: 'PUT',
                headers: authHeaders(),
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (!res.ok) {
                showToast(data.detail || 'Could not update session.', false);
                return;
            }

            const idx = mySessions.findIndex(s => s._id === currentEditId);
            if (idx !== -1) mySessions[idx] = data;

            const cardEl = document.getElementById('host-card-' + currentEditId);
            if (cardEl) {
                const isPast = data.date < TODAY;
                cardEl.querySelector('.card-title').textContent = data.course;
                cardEl.querySelector('.d-flex.gap-1').innerHTML =
                    (isPast ? '<span class="badge bg-secondary">Past</span>' : '<span class="badge bg-success">Upcoming</span>') +
                    typeBadge(data.type);
                cardEl.querySelector('.card-text.mb-1').innerHTML = data.date + ' &nbsp;|&nbsp; ' + data.time;
                cardEl.querySelector('.text-truncate').textContent = data.location;
                cardEl.querySelector('.mb-3').innerHTML = progressBar(data.enrolled_count, data.capacity);
            }

            bootstrap.Modal.getInstance(document.getElementById('edit-modal')).hide();
            showToast('Session updated successfully!', true);
        });

        init();
    </script>

</body>

</html>
