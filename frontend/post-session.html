<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Session — StudyMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">StudyMatch</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="sessions.html">Browse Sessions</a></li>
                <li class="nav-item"><a class="nav-link active" href="post-session.html">Post Session</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">My Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li>
            </ul>
            <div id="nav-guest" class="d-none">
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="register.html" class="btn btn-light">Register</a>
            </div>
            <div id="nav-user" class="d-none d-flex align-items-center gap-2">
                <span class="text-white">Hi, <strong id="nav-username"></strong></span>
                <button id="nav-logout" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title mb-4">Post a Study Session</h2>

                    <form id="post-form">
                        <div class="mb-3">
                            <label for="course" class="form-label">Course</label>
                            <input type="text" class="form-control" id="course" placeholder="e.g. EECE480" required>
                        </div>
                        <div class="mb-3">
                            <label for="type" class="form-label">Session Type</label>
                            <select class="form-select" id="type" required>
                                <option value="" disabled selected>Select type</option>
                                <option value="online">Online</option>
                                <option value="in-person">In-Person</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" placeholder="Room name or meeting link" required>
                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label for="date" class="form-label">Date</label>
                                <input type="date" class="form-control" id="date" required>
                            </div>
                            <div class="col mb-3">
                                <label for="time" class="form-label">Time</label>
                                <input type="time" class="form-control" id="time" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity</label>
                            <input type="number" class="form-control" id="capacity" min="1" placeholder="Max number of students" required>
                        </div>

                        <div id="error-msg" class="alert alert-danger d-none"></div>

                        <button type="submit" class="btn btn-primary w-100">Post Session</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script>
    if (!isLoggedIn()) {
        window.location.href = 'login.html';
    }

    document.getElementById('post-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const errorMsg = document.getElementById('error-msg');
        errorMsg.classList.add('d-none');

        const body = {
            course: document.getElementById('course').value,
            type: document.getElementById('type').value,
            location: document.getElementById('location').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            capacity: parseInt(document.getElementById('capacity').value)
        };

        const res = await fetch(BASE_URL + '/sessions', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            errorMsg.textContent = data.detail || 'Failed to post session. Please try again.';
            errorMsg.classList.remove('d-none');
            return;
        }

        window.location.href = 'sessions.html';
    });
</script>

</body>
</html>
