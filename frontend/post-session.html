    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

        <a class="navbar-brand fw-bold" href="index.html">StudyMatch</a>

            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="sessions.html">Browse Sessions</a></li>
                <li class="nav-item"><a class="nav-link active" href="post-session.html">Post Session</a></li>

</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title mb-4">Post a Study Session</h2>

                    <form id="post-form">
                        <div class="mb-3">
                            <label for="course" class="form-label">Course</label>
                            <input type="text" class="form-control" id="course" placeholder="e.g. EECE480">
                            <div class="text-danger small mt-1" id="err-course"></div>
                        </div>
                        <div class="mb-3">
                            <label for="type" class="form-label">Session Type</label>
                            <select class="form-select" id="type">
                                <option value="" disabled selected>Select type</option>
                                <option value="online">Online</option>
                                <option value="in-person">In-Person</option>
                            </select>
                            <div class="text-danger small mt-1" id="err-type"></div>
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" placeholder="Room name or meeting link">
                            <div class="text-danger small mt-1" id="err-location"></div>
                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label for="date" class="form-label">Date</label>
                                <input type="date" class="form-control" id="date">
                                <div class="text-danger small mt-1" id="err-date"></div>
                            </div>
                            <div class="col mb-3">
                                <label for="time" class="form-label">Time</label>
                                <input type="time" class="form-control" id="time">
                                <div class="text-danger small mt-1" id="err-time"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity</label>
                            <input type="number" class="form-control" id="capacity" placeholder="Max number of students">
                            <div class="text-danger small mt-1" id="err-capacity"></div>
                        </div>

                        <div id="error-msg" class="alert alert-danger d-none"></div>

                        <button type="submit" class="btn btn-primary w-100">Post Session</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script>
    if (!isLoggedIn()) {
        window.location.href = 'login.html';
    }

    function validatePostForm() {
        const course = document.getElementById('course').value.trim();
        const type = document.getElementById('type').value;
        const location = document.getElementById('location').value.trim();
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const capacity = document.getElementById('capacity').value;

        ['course', 'type', 'location', 'date', 'time', 'capacity'].forEach(f => {
            document.getElementById('err-' + f).textContent = '';
        });

        const today = new Date().toISOString().split('T')[0];
        let valid = true;

        if (!course || course.length < 2) {
            document.getElementById('err-course').textContent = 'Course must be at least 2 characters.';
            valid = false;
        }
        if (!type || !['online', 'in-person'].includes(type)) {
            document.getElementById('err-type').textContent = 'Please select a session type.';
            valid = false;
        }
        if (!location || location.length < 3) {
            document.getElementById('err-location').textContent = 'Location must be at least 3 characters.';
            valid = false;
        }
        if (!date) {
            document.getElementById('err-date').textContent = 'Date is required.';
            valid = false;
        } else if (date < today) {
            document.getElementById('err-date').textContent = 'Date must be today or in the future.';
            valid = false;
        }
        if (!time) {
            document.getElementById('err-time').textContent = 'Time is required.';
            valid = false;
        }
        const cap = parseInt(capacity);
        if (!capacity) {
            document.getElementById('err-capacity').textContent = 'Capacity is required.';
            valid = false;
        } else if (isNaN(cap) || cap < 1) {
            document.getElementById('err-capacity').textContent = 'Capacity must be at least 1.';
            valid = false;
        } else if (cap > 50) {
            document.getElementById('err-capacity').textContent = 'Capacity cannot exceed 50.';
            valid = false;
        }

        return valid;
    }

    document.getElementById('post-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        if (!validatePostForm()) return;

        const errorMsg = document.getElementById('error-msg');
        errorMsg.classList.add('d-none');

        const body = {
            course: document.getElementById('course').value.trim(),
            type: document.getElementById('type').value,
            location: document.getElementById('location').value.trim(),
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            capacity: parseInt(document.getElementById('capacity').value)
        };

        const res = await fetch(BASE_URL + '/sessions', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            errorMsg.textContent = data.detail || 'Failed to post session. Please try again.';
            errorMsg.classList.remove('d-none');
            return;
        }

        window.location.href = 'sessions.html';
    });
</script>

</body>
</html>
